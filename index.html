<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chess</title>

  <!-- chessboard.js styles -->
  <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.css">

  <!-- App styles -->
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="app">

  <!-- ── Left: Board + Controls ────────────────────────────────────────── -->
  <div id="board-panel">

    <!-- Opponent (top) -->
    <div class="player-bar">
      <span class="player-name" id="top-name">Black</span>
      <span class="captured-pieces" id="top-captured"></span>
    </div>

    <!-- Board (chessboard.js renders here) -->
    <div id="board-container">
      <div id="board"></div>

      <!-- Pawn promotion overlay -->
      <div id="promotion-modal" class="hidden">
        <div id="promotion-dialog">
          <p>Choose promotion piece</p>
          <div id="promotion-choices"></div>
        </div>
      </div>
    </div>

    <!-- Player (bottom) -->
    <div class="player-bar">
      <span class="player-name" id="bottom-name">White</span>
      <span class="captured-pieces" id="bottom-captured"></span>
    </div>

    <!-- Game status -->
    <div id="status-bar" class="active">
      <span id="status-text">White to move</span>
    </div>

    <!-- Controls -->
    <div id="controls">
      <button id="btn-new-game">New Game</button>
      <button id="btn-flip">Flip Board</button>
      <button id="btn-undo">Undo</button>

      <select id="mode-select" title="Game mode">
        <option value="hvh">Human vs Human</option>
        <option value="hva">Human vs AI</option>
        <option value="hvo">Online Multiplayer</option>
      </select>

      <span id="color-select-wrap" style="display:none">
        <select id="color-select" title="Your color">
          <option value="w">Play as White</option>
          <option value="b">Play as Black</option>
        </select>
      </span>

      <!-- Online multiplayer room UI (shown only in hvo mode) -->
      <div id="room-panel" style="display:none; width:100%">
        <!-- Lobby: create or join -->
        <div id="room-lobby">
          <button id="btn-create-room">Create Room</button>
          <span class="room-or">or</span>
          <input id="room-code-input" type="text" maxlength="6"
                 placeholder="Room code" autocomplete="off" spellcheck="false">
          <button id="btn-join-room">Join Room</button>
        </div>
        <!-- Waiting for opponent (shown after creating) -->
        <div id="room-waiting" style="display:none">
          Share this code with your opponent:
          <strong id="room-code-display"></strong>
          <button id="btn-copy-code">Copy</button>
        </div>
        <!-- Active game info -->
        <div id="room-active" style="display:none">
          <span id="room-active-info"></span>
          <button id="btn-leave-room">Leave Game</button>
        </div>
      </div>
    </div>
  </div>

  <!-- ── Right: Move History ────────────────────────────────────────────── -->
  <div id="history-panel">
    <h2>Move History</h2>

    <div id="move-list-container">
      <table id="move-list">
        <thead>
          <tr>
            <th>#</th>
            <th>White</th>
            <th>Black</th>
          </tr>
        </thead>
        <tbody id="move-list-body"></tbody>
      </table>
    </div>

    <div id="pgn-section">
      <label>PGN</label>
      <textarea id="pgn-output" readonly spellcheck="false"></textarea>
    </div>
  </div>

</div><!-- #app -->

<!-- ── Scripts (load order matters) ──────────────────────────────────────── -->
<!-- 1. jQuery (required by chessboard.js) -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>

<!-- 2. chessboard.js -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.js"></script>

<!-- 3. chess.js 0.10.3 - exposes Chess as a browser global -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>

<!-- 4. Firebase compat SDK (browser globals, no build step needed) -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<!-- 5. Multiplayer module -->
<script src="js/multiplayer.js"></script>

<!-- 6. Firebase init — PASTE YOUR CONFIG VALUES FROM THE FIREBASE CONSOLE -->
<script>
Multiplayer.init({
  apiKey:            "PASTE_YOUR_API_KEY",
  authDomain:        "PASTE_YOUR_AUTH_DOMAIN",
  databaseURL:       "PASTE_YOUR_DATABASE_URL",
  projectId:         "PASTE_YOUR_PROJECT_ID",
  storageBucket:     "PASTE_YOUR_STORAGE_BUCKET",
  messagingSenderId: "PASTE_YOUR_MESSAGING_SENDER_ID",
  appId:             "PASTE_YOUR_APP_ID",
});
</script>

<!-- 7. AI engine -->
<script src="js/ai.js"></script>

<!-- 8. Game controller -->
<script src="js/game.js"></script>

</body>
</html>
